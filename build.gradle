buildscript {
  repositories {
    mavenCentral()
    maven {url "https://developer.marklogic.com/maven2/"}
    maven {url "http://rjrudin.github.io/marklogic-java/releases"}
    mavenLocal()
  }

  dependencies {
    classpath group:"com.marklogic", name:"ml-gradle", version:"0.4"
  }
}

apply plugin: 'ml-gradle'
apply plugin: 'maven-publish'

ext {
  
  pubVersion = project.hasProperty("pubVersion") ? project.getProperty("pubVersion") : "0.3." + java.util.Calendar.getInstance().getTimeInMillis()
  
  mlUsername = "admin"
  mlPassword = "admin"

  mlAppConfig {
    name = "geonames"
    host = "localhost"
    restPort = 8010
    xdbcPort = 8011
  }

}

configurations {
  	xquery
}

task xqueryZip(type: Zip) {
  from 'src/main/xqy'
  into 'geonames'
  destinationDir file('build/tmp/xquery')
  baseName "geonames"
}

artifacts {
  xquery xqueryZip
 }


publishing {
  publications {
    mainXquery(MavenPublication) {
      groupId 'com.marklogic'
      artifactId 'geonames'
      version pubVersion
      artifact xqueryZip
    }
    repositories {
      maven {
        if (project.hasProperty("nexusPublish")) {
          url "file:///usr/local/sonatype-work/nexus/storage/snapshots"
        } else if (project.hasProperty("release")) {
          url "file://$projectDir/../../gh-pages-marklogic-java/releases"
        }
        else {
          url mavenLocal().url
        }
      }
    }
  }
}


