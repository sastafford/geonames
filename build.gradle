buildscript {
  repositories {
    mavenCentral()
    maven {url "https://developer.marklogic.com/maven2/"}
    maven {url "http://rjrudin.github.io/marklogic-java/releases"}
    mavenLocal()
  }

  dependencies {
    classpath group:"com.marklogic", name:"ml-gradle", version:"0.4"
  }
}

apply plugin: 'ml-gradle'

ext {

  mlUsername = "admin"
  mlPassword = "admin"

  mlAppConfig {
    name = "geonames"
    host = "localhost"
    restPort = 8010
    xdbcPort = 8011
  }

}

